<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF6B9D"/>
      <stop offset="50%" stop-color="#FF9F43"/>
      <stop offset="100%" stop-color="#FECA57"/>
    </linearGradient>
    <radialGradient id="shine" cx="35%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="180" height="180" rx="40" fill="url(#bg)"/>
  <!-- Shine overlay -->
  <rect width="180" height="180" rx="40" fill="url(#shine)"/>
  <!-- Decorative dots -->
  <circle cx="28"  cy="28"  r="8" fill="#fff" opacity="0.3"/>
  <circle cx="152" cy="28"  r="6" fill="#fff" opacity="0.25"/>
  <circle cx="20"  cy="155" r="5" fill="#fff" opacity="0.2"/>
  <circle cx="158" cy="158" r="9" fill="#fff" opacity="0.25"/>
  <circle cx="90"  cy="12"  r="4" fill="#fff" opacity="0.2"/>
  <!-- Gold star accent -->
  <circle cx="136" cy="46" r="7" fill="#fff" opacity="0.9"/>
  <circle cx="136" cy="46" r="4" fill="#FECA57"/>
  <!-- The C -->
  <text
    x="90" y="132"
    text-anchor="middle"
    font-family="'Fredoka One', 'Arial Rounded MT Bold', 'Trebuchet MS', cursive"
    font-size="138"
    font-weight="900"
    fill="white"
    opacity="0.95"
  >C</text>
</svg>
